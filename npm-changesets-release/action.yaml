name: 'npm changesets release'
description: 'Run changesets to open a Version Packages PR or publish packages to the HMCTS Azure Artifacts npm feed.'
author: 'HMCTS'

inputs:
  node-version:
    description: 'Node.js version (overridden by node-version-file if both are set)'
    required: false
    default: ''
  node-version-file:
    description: 'Path to a Node version file (e.g. .nvmrc)'
    required: false
    default: '.nvmrc'
  setup-node:
    description: 'Whether to run actions/setup-node. Set to false if the calling job has already configured Node.'
    required: false
    default: 'true'
  install-command:
    description: 'Command to install dependencies before running changesets'
    required: false
    default: 'yarn install --immutable'
  version-command:
    description: 'Command for the version step (applies pending changesets, bumps versions, regenerates the lockfile)'
    required: false
    default: 'yarn changeset version'
  publish-command:
    description: 'Command for the publish step (runs after the Version Packages PR is merged)'
    required: false
    default: 'yarn changeset publish'
  commit-message:
    description: 'Commit message and PR title for the Version Packages PR'
    required: false
    default: 'chore: version packages'
  azure-artifact-username:
    description: 'Username for the HMCTS Azure Artifacts feed. Optional so a calling reusable workflow can use `secrets: inherit` even when the secret is not yet configured; npm publish will fail at runtime if a real publish is attempted without it. Defaults to "github" when empty.'
    required: false
    default: ''
  azure-artifact-token:
    description: 'PAT for the HMCTS Azure Artifacts feed with Packaging (Read & Write) on hmcts-lib. Same secret HMCTS Gradle publish workflows consume. Optional so a calling reusable workflow can use `secrets: inherit` even when the secret is not yet configured; npm publish will fail at runtime if a real publish is attempted without it.'
    required: false
    default: ''
  azure-artifact-feed-url:
    description: 'Azure Artifacts npm feed URL. Defaults to the shared HMCTS hmcts-lib feed.'
    required: false
    default: 'https://pkgs.dev.azure.com/hmcts/Artifacts/_packaging/hmcts-lib/npm/registry/'
  npm-scope:
    description: 'Optional npm scope (e.g. "@hmcts-cft"). When set, writes "<scope>:registry=<feed>" into the runtime .npmrc so scoped packages route to the Azure feed even if their package.json is missing publishConfig.registry.'
    required: false
    default: ''
  working-directory:
    description: 'Working directory'
    required: false
    default: '.'

outputs:
  published:
    description: 'Whether packages were published in this run ("true" or "false")'
    value: ${{ steps.changesets.outputs.published }}
  publishedPackages:
    description: 'JSON array of published packages (name, version)'
    value: ${{ steps.changesets.outputs.publishedPackages }}
  hasChangesets:
    description: 'Whether pending changesets exist on the current ref ("true" or "false")'
    value: ${{ steps.changesets.outputs.hasChangesets }}

runs:
  using: 'composite'
  steps:
    - name: Enable corepack
      shell: bash
      run: corepack enable

    - name: Set up Node
      if: inputs.setup-node == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        node-version-file: ${{ inputs.node-version-file }}
        cache: 'yarn'

    - name: Configure npm authentication for Azure Artifacts
      shell: bash
      env:
        AZURE_DEVOPS_ARTIFACT_USERNAME: ${{ inputs.azure-artifact-username }}
        AZURE_DEVOPS_ARTIFACT_TOKEN: ${{ inputs.azure-artifact-token }}
        FEED_URL: ${{ inputs.azure-artifact-feed-url }}
        NPM_SCOPE: ${{ inputs.npm-scope }}
      run: |
        token_b64="$(printf %s "$AZURE_DEVOPS_ARTIFACT_TOKEN" | base64 | tr -d '\n')"
        username="${AZURE_DEVOPS_ARTIFACT_USERNAME:-github}"
        feed="${FEED_URL%/}/"
        # Strip the scheme to build the npm-style "//host/path/" auth keys.
        feed_no_scheme="${feed#https:}"
        cat > "$HOME/.npmrc" <<EOF
        registry=${feed}
        always-auth=true
        ${feed_no_scheme}:username=${username}
        ${feed_no_scheme}:_password=${token_b64}
        ${feed_no_scheme}:email=github-actions@hmcts.net
        EOF
        if [ -n "$NPM_SCOPE" ]; then
          # Defend against scoped packages whose package.json is missing
          # publishConfig.registry — npm picks @<scope>:registry over the
          # default `registry=` line.
          scope="${NPM_SCOPE#@}"
          echo "@${scope}:registry=${feed}" >> "$HOME/.npmrc"
        fi

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.install-command }}

    - name: Run changesets
      id: changesets
      uses: changesets/action@v1
      with:
        cwd: ${{ inputs.working-directory }}
        version: ${{ inputs.version-command }}
        publish: ${{ inputs.publish-command }}
        commit: ${{ inputs.commit-message }}
        title: ${{ inputs.commit-message }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
