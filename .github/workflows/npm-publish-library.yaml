name: npm publish library

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version (overridden by node-version-file if both are set)'
        required: false
        type: string
        default: ''
      node-version-file:
        description: 'Path to a Node version file (e.g. .nvmrc)'
        required: false
        type: string
        default: '.nvmrc'
      install-command:
        description: 'Command to install dependencies'
        required: false
        type: string
        default: 'yarn install --immutable'
      build-command:
        description: 'Command to build packages before publishing. Set to ":" to skip.'
        required: false
        type: string
        default: 'yarn build'
      release-please-config-file:
        description: 'Path to the release-please config file.'
        required: false
        type: string
        default: 'release-please-config.json'
      release-please-manifest-file:
        description: 'Path to the release-please manifest file.'
        required: false
        type: string
        default: '.release-please-manifest.json'
      working-directory:
        description: 'Working directory'
        required: false
        type: string
        default: '.'
      runner:
        description: 'GitHub runner to use'
        required: false
        type: string
        default: 'ubuntu-latest'
      azure-artifact-feed-url:
        description: 'Azure Artifacts npm feed URL. Defaults to the shared HMCTS hmcts-lib feed.'
        required: false
        type: string
        default: 'https://pkgs.dev.azure.com/hmcts/Artifacts/_packaging/hmcts-lib/npm/registry/'
      npm-scope:
        description: 'Optional npm scope (e.g. "@hmcts-cft"). When set, writes "<scope>:registry=<feed>" into the runtime .npmrc so scoped packages route to the Azure feed even if their package.json is missing publishConfig.registry.'
        required: false
        type: string
        default: ''
    secrets:
      AZURE_DEVOPS_ARTIFACT_USERNAME:
        description: 'Username for the HMCTS Azure Artifacts feed. Same org-level secret HMCTS Gradle publishes use. Optional at workflow_call validation time so `secrets: inherit` works on repos without the secret yet; publish will fail at runtime if a real publish is attempted without it.'
        required: false
      AZURE_DEVOPS_ARTIFACT_TOKEN:
        description: 'PAT for the HMCTS Azure Artifacts feed with Packaging (Read & Write) on hmcts-lib. Same org-level secret HMCTS Gradle publishes use. Optional at workflow_call validation time so `secrets: inherit` works on repos without the secret yet; publish will fail at runtime if a real publish is attempted without it.'
        required: false
    outputs:
      releases_created:
        description: 'Whether any releases were created in this run.'
        value: ${{ jobs.release.outputs.releases_created }}
      paths_released:
        description: 'JSON array of paths whose packages were released.'
        value: ${{ jobs.release.outputs.paths_released }}

jobs:
  release:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write          # tag + commit the release PR
      pull-requests: write     # open/update the release PR
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: release
        uses: hmcts/cnp-githubactions-library/npm-publish-library@feat/release-please
        with:
          node-version: ${{ inputs.node-version }}
          node-version-file: ${{ inputs.node-version-file }}
          install-command: ${{ inputs.install-command }}
          build-command: ${{ inputs.build-command }}
          release-please-config-file: ${{ inputs.release-please-config-file }}
          release-please-manifest-file: ${{ inputs.release-please-manifest-file }}
          azure-artifact-username: ${{ secrets.AZURE_DEVOPS_ARTIFACT_USERNAME }}
          azure-artifact-token: ${{ secrets.AZURE_DEVOPS_ARTIFACT_TOKEN }}
          azure-artifact-feed-url: ${{ inputs.azure-artifact-feed-url }}
          npm-scope: ${{ inputs.npm-scope }}
