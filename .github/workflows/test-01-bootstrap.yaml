name: "Test 1: Bootstrap (v1.0.0 with no tags)"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify no git tags exist
        run: |
          TAG_COUNT=$(git tag | wc -l)
          echo "Git tags found: $TAG_COUNT"
          if [ "$TAG_COUNT" -gt 0 ]; then
            echo "❌ FAILED: Sandbox should have no tags"
            exit 1
          fi
          echo "✅ PASS: No tags present"

      - name: Test draft release action
        id: release
        uses: hmcts/cnp-githubactions-library/draft-release@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate bootstrap version
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          TAG="${{ steps.release.outputs.tag }}"
          
          if [ "$VERSION" != "1.0.0" ]; then
            echo "❌ FAILED: Expected version 1.0.0, got $VERSION"
            exit 1
          fi
          
          if [ "$TAG" != "v1.0.0" ]; then
            echo "❌ FAILED: Expected tag v1.0.0, got $TAG"
            exit 1
          fi
          
          echo "✅ PASS: Bootstrap successful"
          echo "   Version: $VERSION"
          echo "   Tag: $TAG"

      - name: Verify GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view v1.0.0 --json isDraft,url
          echo "✅ PASS: Draft release created in GitHub"

      - name: Report results to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ steps.release.outcome }}' === 'success' ? '✅ PASS' : '❌ FAIL';
            console.log(`Test 1 (Bootstrap): ${result}`);
