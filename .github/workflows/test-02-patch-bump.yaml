name: "Test 2: Patch Bump (1.0.0 → 1.0.1)"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create initial commit and tag
        run: |
          # Ensure we have at least one commit
          if ! git rev-parse HEAD > /dev/null 2>&1; then
            echo "dummy" > dummy.txt
            git add dummy.txt
            git commit -m "initial commit"
          fi
          
          # Tag the current commit if not already tagged
          if ! git tag | grep -q "v1.0.0"; then
            git tag v1.0.0 HEAD
            git push origin v1.0.0 2>/dev/null || true
          else
            echo "✅ v1.0.0 tag already exists"
          fi

      - name: Make a new commit (simulate feature)
        run: |
          echo "# Feature" >> README.md
          git add README.md
          git commit -m "feat: add feature"
          git push

      - name: Test patch bump
        id: release
        uses: hmcts/cnp-githubactions-library/draft-release@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          bump-type: patch

      - name: Validate patch bump
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          TAG="${{ steps.release.outputs.tag }}"
          
          if [ "$VERSION" != "1.0.1" ]; then
            echo "❌ FAILED: Expected 1.0.1, got $VERSION"
            exit 1
          fi
          
          if [ "$TAG" != "v1.0.1" ]; then
            echo "❌ FAILED: Expected v1.0.1, got $TAG"
            exit 1
          fi
          
          echo "✅ PASS: Patch bump successful"
          echo "   Version: $VERSION"
          echo "   Tag: $TAG"
