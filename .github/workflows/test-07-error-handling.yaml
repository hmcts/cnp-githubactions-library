name: "Test 7: Error Handling"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-invalid-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test invalid bump-type (should fail)
        id: invalid
        continue-on-error: true
        uses: hmcts/cnp-githubactions-library/draft-release@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          bump-type: "invalid-type"

      - name: Verify rejection
        run: |
          if [ "${{ steps.invalid.outcome }}" != "failure" ]; then
            echo "❌ FAILED: Expected failure for invalid bump-type"
            exit 1
          fi
          echo "✅ PASS: Invalid bump-type rejected"

  test-missing-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test missing github-token (should fail)
        id: no-token
        continue-on-error: true
        uses: hmcts/cnp-githubactions-library/draft-release@main
        with:
          github-token: ""

      - name: Verify rejection
        run: |
          if [ "${{ steps.no-token.outcome }}" != "failure" ]; then
            echo "❌ FAILED: Expected failure for empty token"
            exit 1
          fi
          echo "✅ PASS: Missing token rejected"
