name: PR Label Check

# Reusable workflow that validates a pull request has at least one recognised
# release label. Without a label, Release Drafter cannot determine the correct
# version bump (patch / minor / major) or categorise the PR in the release notes.
#
# Usage — add this to a .github/workflows/pr-label-check.yaml in your repo:
#
#   on:
#     pull_request:
#       types: [labeled, unlabeled, opened, reopened, synchronize]
#
#   jobs:
#     labels:
#       uses: hmcts/cnp-githubactions-library/workflows/label-check.yaml@main
#       with:
#         labels: ${{ toJson(github.event.pull_request.labels.*.name) }}

on:
  workflow_call:
    inputs:
      labels:
        description: >
          JSON array of label names currently on the PR.
          Pass using: toJson(github.event.pull_request.labels.*.name)
        required: true
        type: string
      extra-allowed-labels:
        description: >
          Space-separated list of additional project-specific labels to accept,
          beyond the standard set. Optional.
        required: false
        type: string
        default: ''

jobs:
  check:
    name: Validate release label
    runs-on: ubuntu-latest
    steps:
      - name: Check for required release label
        env:
          PR_LABELS: ${{ inputs.labels }}
          EXTRA: ${{ inputs.extra-allowed-labels }}
        run: |
          # HMCTS standard release labels — aligned with .github/release-drafter.yml
          STANDARD_LABELS="breaking-change enhancement bug dependencies documentation chore"

          ALLOWED="$STANDARD_LABELS $EXTRA"

          # Check skip label first — valid, just excluded from release notes
          if echo "$PR_LABELS" | grep -qi '"skip-changelog"'; then
            echo "✅ PR has skip label: skip-changelog — will be excluded from release notes"
            exit 0
          fi

          FOUND_LABEL=""
          for label in $ALLOWED; do
            # Match whole label name (case-insensitive) inside the JSON array
            if echo "$PR_LABELS" | grep -qi "\"$label\""; then
              FOUND_LABEL="$label"
              break
            fi
          done

          if [ -z "$FOUND_LABEL" ]; then
            echo "❌ This PR is missing a release label."
            echo ""
            echo "Add one of the following labels before merging:"
            echo ""
            echo "  breaking-change   →  major bump  (1.0.0 → 2.0.0)  API breaks, removals"
            echo "  enhancement       →  minor bump  (1.0.0 → 1.1.0)  new features"
            echo "  bug               →  patch bump  (1.0.0 → 1.0.1)  bug fixes"
            echo "  dependencies      →  patch bump                    dependency updates"
            echo "  documentation     →  patch bump                    docs-only changes"
            echo "  chore             →  patch bump                    maintenance, refactoring"
            echo "  skip-changelog    →  no bump                       excluded from release notes"
            echo ""
            echo "Current labels on this PR: $PR_LABELS"
            exit 1
          fi

          echo "✅ PR has release label: '$FOUND_LABEL'"
          echo ""
          echo "This label maps to:"
          case "$FOUND_LABEL" in
            breaking-change)
              echo "  → major version bump  (e.g. 1.2.3 → 2.0.0)"
              ;;
            enhancement)
              echo "  → minor version bump  (e.g. 1.2.3 → 1.3.0)"
              ;;
            bug|dependencies|documentation|chore)
              echo "  → patch version bump  (e.g. 1.2.3 → 1.2.4)"
              ;;
            *)
              echo "  → patch version bump  (e.g. 1.2.3 → 1.2.4)  [via extra-allowed-labels]"
              ;;
          esac
