name: Update changelog

on:
  workflow_call:
    inputs:
      version:
        description: 'SemVer version string without prefix (e.g. 1.0.1).'
        required: true
        type: string
      tag:
        description: 'Full tag name including prefix (e.g. v1.0.1).'
        required: true
        type: string
      changelog-path:
        description: 'Path to the changelog file relative to the repository root.'
        required: false
        type: string
        default: 'CHANGELOG.md'
      release-notes:
        description: 'Release notes body. Leave blank to auto-fetch from the GitHub draft release.'
        required: false
        type: string
        default: ''
      git-user-name:
        description: 'Git commit author name.'
        required: false
        type: string
        default: 'github-actions[bot]'
      git-user-email:
        description: 'Git commit author email.'
        required: false
        type: string
        default: 'github-actions[bot]@users.noreply.github.com'
      commit-message:
        description: 'Commit message template. Use {version} as a placeholder for the version number.'
        required: false
        type: string
        default: 'docs: update CHANGELOG for {version} [skip ci]'
      runner:
        description: 'GitHub Actions runner to use.'
        required: false
        type: string
        default: 'ubuntu-latest'
      github-token:
        description: |
          GitHub token passed to the composite action. Defaults to the built-in github.token.
          Override with a PAT if you need the changelog commit to trigger other workflows
          (the default GITHUB_TOKEN cannot trigger downstream workflow runs by design).
        required: false
        type: string
        default: ''
    outputs:
      changelog-path:
        description: 'Path to the updated changelog file.'
        value: ${{ jobs.update-changelog.outputs.changelog-path }}
      committed:
        description: 'Whether a changelog commit was made (true/false).'
        value: ${{ jobs.update-changelog.outputs.committed }}

jobs:
  update-changelog:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
    outputs:
      changelog-path: ${{ steps.changelog.outputs.changelog-path }}
      committed:      ${{ steps.changelog.outputs.committed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update changelog
        id: changelog
        # Pinned to @main — the library does not yet tag its own releases.
        # Once the library itself adopts draft-release (dogfooding), update this
        # to a pinned tag/SHA for reproducible behaviour.
        uses: hmcts/cnp-githubactions-library/update-changelog@main
        with:
          github-token:    ${{ inputs.github-token != '' && inputs.github-token || github.token }}
          version:         ${{ inputs.version }}
          tag:             ${{ inputs.tag }}
          changelog-path:  ${{ inputs.changelog-path }}
          release-notes:   ${{ inputs.release-notes }}
          git-user-name:   ${{ inputs.git-user-name }}
          git-user-email:  ${{ inputs.git-user-email }}
          commit-message:  ${{ inputs.commit-message }}
