name: 'Update Changelog'
description: |
  Prepend a new version section to CHANGELOG.md (creating it if absent) and commit it back to
  the branch. Follows the Keep a Changelog format (https://keepachangelog.com) and pairs
  naturally with the draft-release action — pass its version/tag outputs directly as inputs here.
  IMPORTANT: The calling job must check out the repository before invoking this action, and the
  token used must have contents:write permission to push the changelog commit.
author: 'HMCTS'

inputs:
  github-token:
    description: 'GitHub token with contents:write permission. Used to fetch release notes and push the changelog commit.'
    required: true
  version:
    description: 'SemVer version string without prefix (e.g. 1.0.1). Accepts the version output from draft-release.'
    required: true
  tag:
    description: 'Full tag name including prefix (e.g. v1.0.1). Accepts the tag output from draft-release.'
    required: true
  changelog-path:
    description: 'Path to the changelog file relative to the repository root.'
    required: false
    default: 'CHANGELOG.md'
  release-notes:
    description: |
      Release notes body to include in the changelog entry. Leave blank to auto-fetch from the
      GitHub draft release for this tag (requires the draft-release action to have run first).
      If the release cannot be found either, falls back to the git log since the previous tag.
    required: false
    default: ''
  git-user-name:
    description: 'Git commit author name.'
    required: false
    default: 'github-actions[bot]'
  git-user-email:
    description: 'Git commit author email.'
    required: false
    default: 'github-actions[bot]@users.noreply.github.com'
  commit-message:
    description: 'Commit message for the changelog update. [skip ci] is appended automatically to prevent recursive workflow runs.'
    required: false
    default: 'docs: update CHANGELOG for {version}'

outputs:
  changelog-path:
    description: 'Path to the updated changelog file.'
    value: ${{ steps.update.outputs.changelog-path }}
  committed:
    description: 'Whether a changelog commit was made (true/false).'
    value: ${{ steps.commit.outputs.committed }}

runs:
  using: 'composite'
  steps:
    - name: Configure git identity
      shell: bash
      env:
        GIT_USER_NAME:  ${{ inputs.git-user-name }}
        GIT_USER_EMAIL: ${{ inputs.git-user-email }}
      run: |
        git config user.name  "$GIT_USER_NAME"
        git config user.email "$GIT_USER_EMAIL"

    - name: Resolve release notes
      id: notes
      shell: bash
      env:
        GH_TOKEN:      ${{ inputs.github-token }}
        TAG:           ${{ inputs.tag }}
        CUSTOM_NOTES:  ${{ inputs.release-notes }}
      run: |
        if [ -n "$CUSTOM_NOTES" ]; then
          echo "Using provided release notes."
          NOTES="$CUSTOM_NOTES"
        else
          echo "Fetching release notes from GitHub draft release for ${TAG}..."
          NOTES=$(gh release view "$TAG" --json body --jq '.body' 2>/dev/null || true)

          if [ -z "$NOTES" ]; then
            echo "Release not found or has no body — falling back to git log since previous tag."
            PREV_TAG=$(git tag -l --sort=-version:refname | grep -v "^${TAG}$" | head -n1)
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
            else
              NOTES=$(git log HEAD --pretty=format:"- %s" --no-merges | head -n 20)
            fi
          fi
        fi

        # Write to a temp file to preserve multi-line content across steps
        NOTES_FILE=$(mktemp)
        printf '%s' "$NOTES" > "$NOTES_FILE"
        echo "notes-file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

    - name: Update changelog file
      id: update
      shell: bash
      env:
        VERSION:        ${{ inputs.version }}
        TAG:            ${{ inputs.tag }}
        CHANGELOG:      ${{ inputs.changelog-path }}
        NOTES_FILE:     ${{ steps.notes.outputs.notes-file }}
      run: |
        DATE=$(date -u +%Y-%m-%d)
        NOTES=$(cat "$NOTES_FILE")

        # Build the new changelog entry
        NEW_ENTRY="## [${VERSION}] - ${DATE}"$'\n\n'"${NOTES}"$'\n'

        if [ -f "$CHANGELOG" ]; then
          # Insert after the first blank line following the header block (if any), else prepend
          # Strategy: find the first '## ' heading and insert before it; fallback to prepend.
          if grep -q '^## ' "$CHANGELOG"; then
            # Prepend new entry before the first existing version section
            FIRST_SECTION_LINE=$(grep -n '^## ' "$CHANGELOG" | head -n1 | cut -d: -f1)
            HEAD_BLOCK=$(head -n $((FIRST_SECTION_LINE - 1)) "$CHANGELOG")
            TAIL_BLOCK=$(tail -n +"${FIRST_SECTION_LINE}" "$CHANGELOG")
            printf '%s\n\n%s\n\n%s\n' "$HEAD_BLOCK" "$NEW_ENTRY" "$TAIL_BLOCK" > "$CHANGELOG"
          else
            # File exists but has no version sections yet — append after existing content
            printf '\n%s\n' "$NEW_ENTRY" >> "$CHANGELOG"
          fi
        else
          # Bootstrap: create the changelog from scratch
          cat > "$CHANGELOG" <<'HEADER'
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

HEADER
          printf '%s\n' "$NEW_ENTRY" >> "$CHANGELOG"
        fi

        # Clean up temp file
        rm -f "$NOTES_FILE"

        echo "changelog-path=${CHANGELOG}" >> "$GITHUB_OUTPUT"
        echo "Changelog updated at ${CHANGELOG}"
        echo "--- Preview (first 40 lines) ---"
        head -n 40 "$CHANGELOG"

    - name: Commit and push changelog
      id: commit
      shell: bash
      env:
        VERSION:        ${{ inputs.version }}
        CHANGELOG:      ${{ inputs.changelog-path }}
        COMMIT_MSG_TPL: ${{ inputs.commit-message }}
      run: |
        git add "$CHANGELOG"

        if git diff --cached --quiet; then
          echo "No changes to commit — changelog already up to date."
          echo "committed=false" >> "$GITHUB_OUTPUT"
        else
          # Substitute {version} placeholder and append [skip ci] to prevent loop
          COMMIT_MSG="${COMMIT_MSG_TPL//\{version\}/${VERSION}} [skip ci]"
          git commit -m "$COMMIT_MSG"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "Pushed changelog commit: ${COMMIT_MSG}"
        fi

        {
          echo "### Changelog Update Summary 📝"
          echo ""
          echo "| Field   | Value |"
          echo "|---------|-------|"
          echo "| Version | \`${VERSION}\` |"
          echo "| File    | \`${CHANGELOG}\` |"
          echo "| Committed | $(cat $GITHUB_OUTPUT | grep '^committed=' | cut -d= -f2) |"
        } >> "$GITHUB_STEP_SUMMARY"
